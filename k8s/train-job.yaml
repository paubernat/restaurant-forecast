# One-off bootstrap Job: full model selection. `kubectl apply -f k8s/train-job.yaml`
# (e.g. on kind/minikube). Runs `find-best-model` — the expensive CV that selects the winner
# and writes artifacts/selection.json + artifacts/best_model.pkl, which the retrain CronJob and
# the predict CronJob then consume. TimesFM is served by a Hugging Face Space reached over HTTP
# (see env below); without an endpoint the pod runs the tree/baseline models only.
# (Note: emptyDir = ephemeral artifacts; use a PVC/object store for real runs.)
apiVersion: batch/v1
kind: Job
metadata:
  name: forecast-select
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: select
          image: gstock-forecasting:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "forecasting", "find-best-model"]
          env:
            # TimesFM HF Space. Token is optional (only if the Space is private); create with:
            #   kubectl create secret generic timesfm --from-literal=endpoint-token=<token>
            - name: FORECAST_TIMESFM_ENDPOINT
              value: "https://paubernat3030-times-fm-server.hf.space/forecast"
            - name: FORECAST_TIMESFM_ENDPOINT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: timesfm
                  key: endpoint-token
                  optional: true
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
      volumes:
        - name: artifacts
          emptyDir: {}
